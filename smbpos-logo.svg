<!-- smbpos-logo.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="170" height="56" viewBox="0 0 160 56">
  <defs>
    <linearGradient id="smbposGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"></stop>
      <stop offset="50%" stop-color="#22d3ee"></stop>
      <stop offset="100%" stop-color="#3b82f6"></stop>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"></stop>
      <stop offset="100%" stop-color="#22d3ee"></stop>
    </linearGradient>
  </defs>

  <!-- Icon: simple POS terminal inside a rounded square -->
  <g transform="translate(4,6)">
    <rect x="0" y="0" width="40" height="40" rx="12" fill="none" stroke="url(#iconGrad)" stroke-width="2"></rect>
    <rect x="9" y="9" width="22" height="16" rx="3" fill="none" stroke="url(#iconGrad)" stroke-width="1.6"></rect>
    <polyline points="12,17 17,21 25,13" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></polyline>
    <rect x="12" y="27" width="16" height="3" rx="1.5" fill="url(#iconGrad)"></rect>
  </g>

  <!-- Wordmark -->
  <text x="56" y="35" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="26" fill="url(#smbposGrad)">
    smbPOS
  </text>
</svg>
